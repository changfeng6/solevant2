<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="30%" stop-color="#fbbf24" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Logo Emblem -->
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <!-- Outer thin gold circle border -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="200 40 10 40" />
    
    <!-- Stylized Wing / Shoe Outline -->
    <path d="M 25 60 
             C 25 45, 40 30, 75 30 
             C 60 45, 55 55, 75 60 
             C 50 62, 35 75, 25 60 Z" 
          fill="url(#goldGrad)" />
    
    <!-- Sole curve highlight -->
    <path d="M 28 65 C 45 75, 65 65, 72 62" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Logo Text -->
  <g transform="translate(130, 45)">
    <!-- Main Brand Name -->
    <text x="0" y="20" font-family="'Cinzel', 'Playfair Display', 'Didot', 'Georgia', serif" font-size="38" font-weight="700" fill="url(#goldText)" letter-spacing="4">SOLEVANT</text>
    <!-- Subtitle -->
    <text x="5" y="45" font-family="'Inter', 'Montserrat', 'Helvetica', sans-serif" font-size="11" font-weight="500" fill="#94a3b8" letter-spacing="8">LUXURY FOOTWEAR</text>
  </g>
</svg>
